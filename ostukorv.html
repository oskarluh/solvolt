<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ostukorv — Solvolt</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">Sol<span>volt</span></a>
    <div class="nav-links" id="nav-links">
      <a href="index.html">Avaleht</a>
      <a href="tooted.html">Tooted</a>
      <a href="meist.html">Meist</a>
      <a href="kontakt.html">Kontakt</a>
    </div>
    <div style="display:flex;align-items:center;gap:12px">
      <a href="ostukorv.html" class="nav-cart">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        Ostukorv
        <span class="nav-cart-count" id="cart-count" style="display:none">0</span>
      </a>
      <button class="nav-mobile-toggle" id="nav-toggle" aria-label="Menüü">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
</nav>

<main class="main-content">
  <div class="container" style="padding-top:48px; padding-bottom:80px">

    <div class="breadcrumb">
      <a href="index.html">Avaleht</a>
      <span class="breadcrumb-sep">›</span>
      <span style="color:var(--text-2)">Ostukorv</span>
    </div>

    <h1 style="font-size:clamp(1.8rem,4vw,2.4rem);margin-bottom:36px">Ostukorv</h1>

    <div id="cart-empty" class="empty-state" style="display:none">
      <div class="empty-state-icon">🛒</div>
      <h3>Ostukorv on tühi</h3>
      <p style="margin-bottom:24px">Lisa mõni toode ostukorvi, et jätkata.</p>
      <a href="tooted.html" class="btn btn-primary">Vaata tooteid</a>
    </div>

    <div id="cart-content" class="cart-layout">
      <!-- Cart items -->
      <div>
        <div id="cart-items"></div>
      </div>

      <!-- Summary -->
      <div>
        <div class="cart-summary">
          <h3>Tellimuse kokkuvõte</h3>
          <div class="summary-row">
            <span>Tooted (<span id="s-count">0</span>)</span>
            <span id="s-subtotal">€0</span>
          </div>
          <div class="summary-row">
            <span>Tarne</span>
            <span style="color:var(--text-3)">Täpsustatakse</span>
          </div>
          <div class="summary-row total">
            <span>Kokku</span>
            <span class="val" id="s-total">€0</span>
          </div>
          <div style="margin-top:20px">
            <button class="btn btn-primary btn-full btn-lg" id="checkout-btn">
              Maksa turvaliselt →
            </button>
          </div>
          <div class="cart-secure-note">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            Turvaliselt Stripe kaudu · Visa, Mastercard
          </div>
          <div style="margin-top:16px; padding-top:16px; border-top:1px solid var(--border); font-size:.8rem; color:var(--text-3); line-height:1.6">
            Küsimusi? <a href="kontakt.html" style="color:var(--accent)">Võta meiega ühendust</a>
          </div>
        </div>
      </div>
    </div>

  </div>
</main>

<script src="assets/js/products.js"></script>
<script src="assets/js/main.js"></script>
<script>
  function renderCart() {
    const items = Cart.get();
    const empty   = document.getElementById('cart-empty');
    const content = document.getElementById('cart-content');

    if (items.length === 0) {
      empty.style.display = 'block';
      content.style.display = 'none';
      return;
    }

    empty.style.display = 'none';
    content.style.display = 'grid';

    document.getElementById('cart-items').innerHTML = items.map(item => `
      <div class="cart-item" id="item-${item.id}">
        <div class="cart-item-img">
          <img src="${item.pilt}" alt="${item.nimi}" onerror="this.src='assets/pildid/placeholder.svg'">
        </div>
        <div>
          <div class="cart-item-name">${item.nimi}</div>
          <div class="cart-item-cat">${KATEGOORIAD[item.kategooria]||item.kategooria}</div>
          <div style="display:flex;align-items:center;gap:12px;margin-top:12px">
            <div class="qty-control" style="scale:.9">
              <button class="qty-btn" onclick="changeQty('${item.id}', ${item.kogus - 1})">−</button>
              <span class="qty-num">${item.kogus}</span>
              <button class="qty-btn" onclick="changeQty('${item.id}', ${item.kogus + 1})">+</button>
            </div>
            <span style="font-family:var(--ff-mono);font-size:.9rem;color:var(--text-2)">${formatPrice(item.hind)} tk</span>
          </div>
          <button class="cart-item-remove" onclick="Cart.remove('${item.id}'); renderCart()">
            Eemalda
          </button>
        </div>
        <div style="text-align:right">
          <div style="font-family:var(--ff-mono);font-size:1.1rem;font-weight:500;color:var(--text-1)">
            ${formatPrice(item.hind * item.kogus)}
          </div>
        </div>
      </div>
    `).join('');

    const total = Cart.total();
    const count = Cart.count();
    document.getElementById('s-count').textContent = count;
    document.getElementById('s-subtotal').textContent = formatPrice(total);
    document.getElementById('s-total').textContent = formatPrice(total);
  }

  function changeQty(id, newQty) {
    Cart.updateQty(id, newQty);
    renderCart();
  }

  // Checkout
  document.getElementById('checkout-btn').addEventListener('click', async () => {
    const items = Cart.get();
    if (!items.length) return;

    const btn = document.getElementById('checkout-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Suunab maksesse...';

    // Kontrolli et kõigil toodetel on Stripe Price ID
    const missingPrice = items.find(i => !i.stripe_price_id || i.stripe_price_id === 'LISA_SIIA');
    if (missingPrice) {
      showToast('⚠️ Maksesüsteem pole veel seadistatud');
      btn.disabled = false;
      btn.innerHTML = 'Maksa turvaliselt →';
      return;
    }

    try {
      const res = await fetch('/.netlify/functions/create-checkout', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          items: items.map(i => ({
            price: i.stripe_price_id,
            quantity: i.kogus
          }))
        })
      });

      const data = await res.json();

      if (data.url) {
        window.location.href = data.url;
      } else {
        throw new Error(data.error || 'Checkout lõi');
      }
    } catch (err) {
      console.error(err);
      showToast('❌ Makse alustamine ebaõnnestus. Palun proovi uuesti.');
      btn.disabled = false;
      btn.innerHTML = 'Maksa turvaliselt →';
    }
  });

  renderCart();
  window.addEventListener('cartUpdated', renderCart);
</script>
</body>
</html>
